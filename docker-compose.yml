services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 10

  server:
    build: .
    ports:
      - "8080:8080"   # REST API
      - "50051:50051" # gRPC
      - "9090:9090"   # Prometheus metrics
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
